<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3:4 圖片標籤排版工具</title>
  <style>
    :root {
      --panel: #17181b;
      --panel-2: #202228;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f5f5;
      --muted: #a6acb8;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      --radius: 24px;
      --page-pad: 16px;
      --panel-pad: 20px;
      --left-col: 360px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.04), transparent 24%),
        linear-gradient(180deg, #121316 0%, #0b0c0e 100%);
      color: var(--text);
      overflow: hidden;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      -webkit-text-size-adjust: 100%;
    }

    .wrap {
      width: 100%;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      padding: var(--page-pad);
      display: grid;
      grid-template-columns: var(--left-col) minmax(0, 1fr);
      gap: 16px;
      overflow: hidden;
    }

    .panel {
      min-height: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .controls {
      min-height: 0;
      padding: 22px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    h1 {
      font-size: 1.1rem;
      margin: 0 0 8px;
      letter-spacing: 0.02em;
    }

    .desc {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.93rem;
    }

    .group + .group {
      margin-top: 18px;
    }

    .label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: #f0f0f0;
    }

    .input,
    .range {
      width: 100%;
    }

    .input {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.95rem;
      outline: none;
    }

    .input[type="file"] {
      padding: 10px 12px;
      cursor: pointer;
    }

    .input[type="color"] {
      height: 46px;
      padding: 6px;
      cursor: pointer;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .range-value {
      min-width: 84px;
      text-align: right;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .range {
      accent-color: #ffffff;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: #f5f5f5;
      color: #111;
      font-weight: 700;
    }

    .ghost {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .preview-panel {
      min-height: 0;
      padding: var(--panel-pad);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      min-height: 0;
    }

    .preview-title {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .canvas-wrap {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 10px;
      background-color: white;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      overflow: hidden;
      touch-action: none;
    }

    .stage {
      position: relative;
      width: 100%;
      max-width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      border-radius: 22px;
      background: linear-gradient(135deg, #1b1d22 0%, #131418 100%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), 0 22px 60px rgba(0, 0, 0, 0.42);
      isolation: isolate;
    }

    .photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      z-index: 1;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
      transform-origin: center center;
      will-change: transform;
    }

    .photo.dragging {
      cursor: grabbing;
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      padding: 24px;
      line-height: 1.7;
      letter-spacing: 0.02em;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.08), transparent 30%),
        linear-gradient(135deg, #23262d 0%, #15171b 100%);
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    .triangle {
      position: absolute;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 110px 0 0 110px;
      border-color: transparent transparent transparent rgba(0, 0, 0, 0.96);
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.24));
      display: none;
      transform-origin: center center;
    }

    .tag {
      position: absolute;
      height: auto;
      display: none;
      filter: drop-shadow(0 14px 18px rgba(0, 0, 0, 0.28));
      transform-origin: center;
    }

    .tag.visible {
      display: block;
    }

    .watermark-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.22;
      mix-blend-mode: normal;
    }

    .watermark-item {
      position: absolute;
      width: 150px;
      height: 150px;
      display: grid;
      place-items: center;
      transform: rotate(-24deg);
    }

    .watermark-shape {
      position: absolute;
      inset: 18px;
      display: grid;
      place-items: center;
    }

    .watermark-text {
      position: relative;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.08em;
      white-space: nowrap;
      padding: 8px 12px;
    }

    .radio-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .radio-card {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 8px;
      min-width: 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #eaeaea;
      font-size: 0.92rem;
    }

    .radio-card input[type="radio"] {
      accent-color: #fff;
      cursor: pointer;
      margin: 0;
    }

    .tag-file {
      width: 18px;
      height: 18px;
      accent-color: #fff;
      cursor: not-allowed;
      opacity: 0.55;
    }

    .tag-file[disabled] {
      pointer-events: none;
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 961px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .wrap {
        height: 100vh;
        height: 100svh;
        height: 100dvh;
        grid-template-columns: var(--left-col) minmax(0, 1fr);
        overflow: hidden;
      }

      .controls,
      .preview-panel {
        min-height: 0;
        height: 100%;
      }

      .controls {
        overflow: auto;
      }

      .preview-panel {
        overflow: hidden;
      }

      .canvas-wrap {
        min-height: 0;
        height: 100%;
      }
    }

    @media (max-width: 960px), (pointer: coarse) {
      body {
        overflow: auto;
      }

      .wrap {
        height: auto;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .controls,
      .preview-panel {
        height: auto;
        overflow: visible;
      }

      .canvas-wrap {
        min-height: min(72vh, 900px);
        min-height: min(72svh, 900px);
        min-height: min(72dvh, 900px);
      }

      .stage {
        max-width: 560px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel controls">
      <h1>3:4 圖片標籤排版工具</h1>
      <p class="desc">
        上傳主圖後，畫面會強制以 <strong>3:4</strong> 顯示並自動裁切。主圖可即時縮放與拖曳構圖。
      </p>

      <div class="group">
        <label class="label" for="mainUpload">主圖片</label>
        <input class="input" id="mainUpload" type="file" accept="image/*" />
      </div>

      <div class="group">
        <label class="label" for="mainScale">主圖縮放</label>
        <div class="range-row">
          <input class="range" id="mainScale" type="range" min="100" max="220" value="100" />
          <div class="range-value" id="mainScaleValue">100%</div>
        </div>
      </div>

      <div class="group">
        <label class="label">標籤位置</label>
        <div class="radio-grid" id="positionGroup">
          <label class="radio-card">
            <input type="radio" name="position" value="left-top" />
            <span>左上</span>
            <input class="tag-file" type="file" data-tag="left-top" accept="image/*" disabled />
          </label>
          <label class="radio-card">
            <input type="radio" name="position" value="left-bottom" checked />
            <span>左下</span>
            <input class="tag-file" type="file" data-tag="left-bottom" accept="image/*" disabled />
          </label>
          <label class="radio-card">
            <input type="radio" name="position" value="right-top" />
            <span>右上</span>
            <input class="tag-file" type="file" data-tag="right-top" accept="image/*" disabled />
          </label>
          <label class="radio-card">
            <input type="radio" name="position" value="right-bottom" />
            <span>右下</span>
            <input class="tag-file" type="file" data-tag="right-bottom" accept="image/*" disabled />
          </label>
        </div>
      </div>

      <div class="group">
        <label class="label" for="tagScale">標籤大小（封印中😈)</label>
        <div class="range-row">
          <input class="range" id="tagScale" type="range" min="48" max="48" value="48" disabled />
          <div class="range-value" id="tagScaleValue">48%</div>
        </div>
      </div>

      <div class="group">
        <label class="label" for="tagInset">標籤內縮（封印中😈)</label>
        <div class="range-row">
          <input class="range" id="tagInset" type="range" min="11" max="11" value="11" disabled />
          <div class="range-value" id="tagInsetValue">11px</div>
        </div>
      </div>

      <div class="group">
        <label class="label" for="watermarkText">滿版浮水印文字</label>
        <input class="input" id="watermarkText" type="text" placeholder="輸入想要印上的內容" />
      </div>

      <div class="group">
        <label class="label" for="watermarkColor">浮水印顏色</label>
        <input class="input" id="watermarkColor" type="color" value="#555555" />
      </div>

      <div class="group">
        <label class="label" for="watermarkOpacity">浮水印透明度</label>
        <div class="range-row">
          <input class="range" id="watermarkOpacity" type="range" min="5" max="60" value="16" />
          <div class="range-value" id="watermarkOpacityValue">16%</div>
        </div>
      </div>

      <div class="group">
        <label class="label">浮水印圖案</label>
        <div class="radio-grid" id="watermarkPatternGroup">
          <label class="radio-card">
            <input type="radio" name="watermarkPattern" value="none" checked />
            <span>不使用</span>
          </label>
          <label class="radio-card">
            <input type="radio" name="watermarkPattern" value="seal" />
            <span>封印章</span>
          </label>
          <label class="radio-card">
            <input type="radio" name="watermarkPattern" value="grid" />
            <span>斜線格紋</span>
          </label>
          <label class="radio-card">
            <input type="radio" name="watermarkPattern" value="ring" />
            <span>圓環印記</span>
          </label>
          <label class="radio-card">
            <input type="radio" name="watermarkPattern" value="diamond" />
            <span>菱形符印</span>
          </label>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="downloadBtn" type="button">下載合成圖</button>
        <button class="ghost" id="resetBtn" type="button">重設</button>
      </div>

      <p class="hint">
        PC 版會固定左右兩區於同一畫面內；觸控裝置則可自由延展。主圖預覽與固定標籤設定會同步反映到下載輸出。
      </p>

      <div id="testStatus" class="visually-hidden" aria-live="polite"></div>
    </aside>

    <section class="panel preview-panel">
      <div class="preview-head">
        <div class="preview-title">預覽</div>
      </div>

      <div class="canvas-wrap" id="canvasWrap">
        <div class="stage" id="stage">
          <img id="mainImage" class="photo" alt="main preview" hidden />
          <div id="placeholder" class="placeholder">
            <div>
              請先上傳主圖片<br />
              畫面將自動套用 3:4 滿版裁切
            </div>
          </div>
          <div class="overlay">
            <div class="triangle" id="triangle"></div>
            <img id="tagImage" class="tag" alt="tag preview" />
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const DEFAULT_TAGS = {
      "left-top": "./左上.png",
      "left-bottom": "./左下.png",
      "right-top": "./右上.png",
      "right-bottom": "./右下.png"
    };

    const FIXED_TAG_SCALE = 0.48;
    const FIXED_TAG_INSET = 11;

    const mainUpload = document.getElementById("mainUpload");
    const mainScale = document.getElementById("mainScale");
    const mainScaleValue = document.getElementById("mainScaleValue");
    const mainImage = document.getElementById("mainImage");
    const tagImage = document.getElementById("tagImage");
    const placeholder = document.getElementById("placeholder");
    const positionRadios = document.querySelectorAll('input[name="position"]');
    const tagFileInputs = document.querySelectorAll("input[data-tag]");
    const triangle = document.getElementById("triangle");
    const stage = document.getElementById("stage");
    const canvasWrap = document.getElementById("canvasWrap");
    const tagScale = document.getElementById("tagScale");
    const tagScaleValue = document.getElementById("tagScaleValue");
    const tagInset = document.getElementById("tagInset");
    const tagInsetValue = document.getElementById("tagInsetValue");
    const watermarkTextInput = document.getElementById("watermarkText");
    const watermarkColorInput = document.getElementById("watermarkColor");
    const watermarkOpacityInput = document.getElementById("watermarkOpacity");
    const watermarkOpacityValue = document.getElementById("watermarkOpacityValue");
    const watermarkPatternRadios = document.querySelectorAll('input[name="watermarkPattern"]');
    const downloadBtn = document.getElementById("downloadBtn");
    const resetBtn = document.getElementById("resetBtn");
    const testStatus = document.getElementById("testStatus");

    const getPosition = () => {
      const checked = document.querySelector('input[name="position"]:checked');
      return checked ? checked.value : "left-bottom";
    };

    const getWatermarkPattern = () => {
      const checked = document.querySelector('input[name="watermarkPattern"]:checked');
      return checked ? checked.value : "none";
    };

    const getWatermarkColor = () => watermarkColorInput.value || "#555555";
    const getWatermarkOpacity = () => Math.max(0.05, Math.min(0.6, Number(watermarkOpacityInput.value) / 100 || 0.16));

    let mainSrc = "";
    let mainObjectUrl = "";
    let mainScaleValueNum = 1;
    let panX = 0;
    let panY = 0;
    let isDraggingMain = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragOriginX = 0;
    let dragOriginY = 0;
    let tagSrc = DEFAULT_TAGS[getPosition()];
    let tagEnabled = false;

    function updateStageSize() {
      if (!canvasWrap) return;
      const availableWidth = Math.max(canvasWrap.clientWidth - 20, 1);
      const availableHeight = Math.max(canvasWrap.clientHeight - 20, 1);
      const widthByHeight = availableHeight * 0.75;
      const finalWidth = Math.max(1, Math.min(availableWidth, widthByHeight));
      stage.style.width = finalWidth + "px";
    }

    function getBaseCoverSize() {
      const naturalWidth = mainImage.naturalWidth || stage.clientWidth || 1;
      const naturalHeight = mainImage.naturalHeight || stage.clientHeight || 1;
      const baseScale = Math.max(stage.clientWidth / naturalWidth, stage.clientHeight / naturalHeight);
      return {
        width: naturalWidth * baseScale,
        height: naturalHeight * baseScale
      };
    }

    function clampMainPan() {
      if (!mainSrc || !mainImage.naturalWidth || !mainImage.naturalHeight) {
        panX = 0;
        panY = 0;
        return;
      }

      if (mainScaleValueNum < 1) {
        mainScaleValueNum = 1;
        mainScale.value = "100";
      }

      const base = getBaseCoverSize();
      const scaledWidth = base.width * mainScaleValueNum;
      const scaledHeight = base.height * mainScaleValueNum;
      const maxX = Math.max(0, (scaledWidth - stage.clientWidth) / 2);
      const maxY = Math.max(0, (scaledHeight - stage.clientHeight) / 2);

      panX = Math.min(maxX, Math.max(-maxX, panX));
      panY = Math.min(maxY, Math.max(-maxY, panY));
    }

    function updateMainImageScale() {
      mainScaleValueNum = Math.max(1, Number(mainScale.value) / 100);
      mainScaleValue.textContent = Math.round(mainScaleValueNum * 100) + "%";
      clampMainPan();
      mainImage.style.transform = "scale(" + mainScaleValueNum + ") translate(" + (panX / mainScaleValueNum) + "px, " + (panY / mainScaleValueNum) + "px)";
    }

    function updateTagDisplaySize() {
      const stageWidth = stage.clientWidth || 1;
      tagImage.style.width = Math.round(stageWidth * FIXED_TAG_SCALE) + "px";
      tagScaleValue.textContent = "48%";
      tagInsetValue.textContent = "11px";
    }

    function clearTriangleBorders() {
      triangle.style.borderWidth = "0";
      triangle.style.borderColor = "transparent";
    }

    function setTriangleStyle(position) {
      triangle.style.transform = "";
      triangle.style.left = "";
      triangle.style.right = "";
      triangle.style.top = "";
      triangle.style.bottom = "";
      clearTriangleBorders();

      const black = "rgba(0,0,0,0.96)";
      triangle.style.borderWidth = "110px 0 0 110px";
      triangle.style.borderColor = "transparent transparent transparent " + black;

      if (position === "left-bottom") {
        triangle.style.left = "0";
        triangle.style.bottom = "0";
        triangle.style.transform = "rotate(0deg)";
      }

      if (position === "left-top") {
        triangle.style.left = "0";
        triangle.style.top = "0";
        triangle.style.transform = "rotate(90deg)";
      }

      if (position === "right-top") {
        triangle.style.right = "0";
        triangle.style.top = "0";
        triangle.style.transform = "rotate(180deg)";
      }

      if (position === "right-bottom") {
        triangle.style.right = "0";
        triangle.style.bottom = "0";
        triangle.style.transform = "rotate(270deg)";
      }
    }

    function hexToRgba(hex, alpha) {
      const safeHex = (hex || "#555555").replace("#", "");
      const normalized = safeHex.length === 3
        ? safeHex.split("").map((c) => c + c).join("")
        : safeHex.padEnd(6, "5").slice(0, 6);
      const r = parseInt(normalized.slice(0, 2), 16);
      const g = parseInt(normalized.slice(2, 4), 16);
      const b = parseInt(normalized.slice(4, 6), 16);
      return "rgba(" + r + ", " + g + ", " + b + ", " + alpha + ")";
    }

    function getColorRgb(hex) {
      const safeHex = (hex || "#555555").replace("#", "");
      const normalized = safeHex.length === 3
        ? safeHex.split("").map((c) => c + c).join("")
        : safeHex.padEnd(6, "5").slice(0, 6);
      return {
        r: parseInt(normalized.slice(0, 2), 16),
        g: parseInt(normalized.slice(2, 4), 16),
        b: parseInt(normalized.slice(4, 6), 16)
      };
    }

    function getColorLuminance(hex) {
      const rgb = getColorRgb(hex);
      return (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
    }

    function getContrastColor(hex, alpha) {
      return getColorLuminance(hex) >= 0.7
        ? "rgba(0, 0, 0, " + alpha + ")"
        : "rgba(255, 255, 255, " + alpha + ")";
    }

    function drawWatermarkPreview() {
      const existing = document.getElementById("watermarkLayer");
      if (existing) existing.remove();

      const text = (watermarkTextInput.value || "").trim();
      const pattern = getWatermarkPattern();
      const watermarkColor = getWatermarkColor();
        const watermarkOpacity = getWatermarkOpacity();
      const opacity = getWatermarkOpacity();
      const luminance = getColorLuminance(watermarkColor);
      watermarkOpacityValue.textContent = Math.round(opacity * 100) + "%";
      if (!text || pattern === "none") return;

      const layer = document.createElement("div");
      layer.id = "watermarkLayer";
      layer.className = "watermark-layer";
      layer.style.opacity = String(Math.min(0.95, opacity * (luminance >= 0.7 ? 2.2 : 1.35)));
      layer.style.mixBlendMode = luminance >= 0.7 ? "screen" : "multiply";

      const w = stage.clientWidth || 1;
      const h = stage.clientHeight || 1;
      const stepX = Math.max(120, Math.round(w / 3.2));
      const stepY = Math.max(120, Math.round(h / 4));

      for (let y = -40; y < h + 80; y += stepY) {
        for (let x = -60; x < w + 120; x += stepX) {
          const item = document.createElement("div");
          item.className = "watermark-item";
          item.style.left = x + "px";
          item.style.top = y + "px";
          item.style.color = hexToRgba(watermarkColor, Math.min(0.96, opacity + (luminance >= 0.7 ? 0.34 : 0.18)));
          item.style.filter = "drop-shadow(0 0 2px " + getContrastColor(watermarkColor, luminance >= 0.7 ? 0.45 : 0.18) + ") drop-shadow(0 0 8px " + getContrastColor(watermarkColor, luminance >= 0.7 ? 0.22 : 0.08) + ")";

          const shape = document.createElement("div");
          shape.className = "watermark-shape";

          if (pattern === "seal") {
            shape.style.border = "2px solid " + hexToRgba(watermarkColor, Math.min(0.85, opacity + 0.12));
            shape.style.borderRadius = "18px";
            shape.style.boxShadow = "inset 0 0 0 1px " + hexToRgba(watermarkColor, Math.min(0.7, opacity + 0.05));
          }
          if (pattern === "grid") {
            shape.style.backgroundImage = "repeating-linear-gradient(45deg, " + hexToRgba(watermarkColor, Math.max(0.08, opacity * 0.95)) + " 0 2px, transparent 2px 10px), repeating-linear-gradient(-45deg, " + hexToRgba(watermarkColor, Math.max(0.06, opacity * 0.75)) + " 0 2px, transparent 2px 10px)";
            shape.style.borderRadius = "16px";
          }
          if (pattern === "ring") {
            shape.style.border = "2px solid " + hexToRgba(watermarkColor, Math.min(0.8, opacity + 0.12));
            shape.style.borderRadius = "999px";
            shape.style.boxShadow = "0 0 0 9px " + hexToRgba(watermarkColor, Math.max(0.08, opacity * 0.45)) + ", inset 0 0 0 1px " + hexToRgba(watermarkColor, Math.min(0.65, opacity + 0.02));
          }
          if (pattern === "diamond") {
            shape.style.border = "2px solid " + hexToRgba(watermarkColor, Math.min(0.8, opacity + 0.12));
            shape.style.borderRadius = "6px";
            shape.style.transform = "rotate(45deg) scale(0.9)";
            shape.style.boxShadow = "0 0 0 8px " + hexToRgba(watermarkColor, Math.max(0.08, opacity * 0.42)) + ", inset 0 0 0 1px " + hexToRgba(watermarkColor, Math.min(0.65, opacity + 0.02));
          }

          const label = document.createElement("div");
          label.className = "watermark-text";
          label.textContent = text;
          label.style.textShadow = "0 0 2px " + getContrastColor(watermarkColor, luminance >= 0.7 ? 0.55 : 0.2) + ", 0 0 10px " + getContrastColor(watermarkColor, luminance >= 0.7 ? 0.25 : 0.08);

          if (pattern === "ring") {
            const innerArc = document.createElement("div");
            innerArc.style.position = "absolute";
            innerArc.style.inset = "14px";
            innerArc.style.border = "1.5px dashed " + hexToRgba(watermarkColor, Math.max(0.1, opacity * 0.6));
            innerArc.style.borderRadius = "999px";
            shape.appendChild(innerArc);

            const crest = document.createElement("div");
            crest.style.position = "absolute";
            crest.style.top = "8px";
            crest.style.left = "50%";
            crest.style.width = "16px";
            crest.style.height = "16px";
            crest.style.transform = "translateX(-50%) rotate(45deg)";
            crest.style.border = "1.5px solid " + hexToRgba(watermarkColor, Math.min(0.75, opacity + 0.08));
            crest.style.background = hexToRgba(watermarkColor, Math.max(0.08, opacity * 0.3));
            shape.appendChild(crest);
          }

          if (pattern === "diamond") {
            const sigil = document.createElement("div");
            sigil.style.position = "absolute";
            sigil.style.inset = "26px";
            sigil.style.transform = "rotate(45deg)";
            sigil.style.border = "1.5px dashed " + hexToRgba(watermarkColor, Math.max(0.1, opacity * 0.58));
            sigil.style.borderRadius = "4px";
            shape.appendChild(sigil);

            const hornLeft = document.createElement("div");
            hornLeft.style.position = "absolute";
            hornLeft.style.top = "8px";
            hornLeft.style.left = "26px";
            hornLeft.style.width = "14px";
            hornLeft.style.height = "18px";
            hornLeft.style.borderTop = "2px solid " + hexToRgba(watermarkColor, Math.min(0.8, opacity + 0.1));
            hornLeft.style.borderLeft = "2px solid " + hexToRgba(watermarkColor, Math.min(0.8, opacity + 0.1));
            hornLeft.style.borderTopLeftRadius = "18px";
            hornLeft.style.transform = "rotate(-20deg)";
            shape.appendChild(hornLeft);

            const hornRight = document.createElement("div");
            hornRight.style.position = "absolute";
            hornRight.style.top = "8px";
            hornRight.style.right = "26px";
            hornRight.style.width = "14px";
            hornRight.style.height = "18px";
            hornRight.style.borderTop = "2px solid " + hexToRgba(watermarkColor, Math.min(0.8, opacity + 0.1));
            hornRight.style.borderRight = "2px solid " + hexToRgba(watermarkColor, Math.min(0.8, opacity + 0.1));
            hornRight.style.borderTopRightRadius = "18px";
            hornRight.style.transform = "rotate(20deg)";
            shape.appendChild(hornRight);
          }

          shape.appendChild(label);
          item.appendChild(shape);
          layer.appendChild(item);
        }
      }

      stage.appendChild(layer);
    }

    function applyLayout() {
      updateStageSize();
      updateMainImageScale();
      updateTagDisplaySize();
      setTriangleStyle(getPosition());

      const style = tagImage.style;
      style.left = "";
      style.right = "";
      style.top = "";
      style.bottom = "";
      style.transform = "";

      if (!tagEnabled) {
        triangle.style.display = "none";
        tagImage.classList.remove("visible");
      } else {
        triangle.style.display = "block";
        tagImage.classList.add("visible");

        switch (getPosition()) {
          case "left-bottom":
            style.left = FIXED_TAG_INSET + "px";
            style.bottom = FIXED_TAG_INSET + "px";
            break;
          case "left-top":
            style.left = FIXED_TAG_INSET + "px";
            style.top = FIXED_TAG_INSET + "px";
            break;
          case "right-top":
            style.right = FIXED_TAG_INSET + "px";
            style.top = FIXED_TAG_INSET + "px";
            break;
          case "right-bottom":
            style.right = FIXED_TAG_INSET + "px";
            style.bottom = FIXED_TAG_INSET + "px";
            break;
        }
      }

      drawWatermarkPreview();
    }

    function beginMainDrag(clientX, clientY) {
      if (!mainSrc) return;
      isDraggingMain = true;
      dragStartX = clientX;
      dragStartY = clientY;
      dragOriginX = panX;
      dragOriginY = panY;
      mainImage.classList.add("dragging");
    }

    function moveMainDrag(clientX, clientY) {
      if (!isDraggingMain) return;
      panX = dragOriginX + (clientX - dragStartX);
      panY = dragOriginY + (clientY - dragStartY);
      applyLayout();
    }

    function endMainDrag() {
      isDraggingMain = false;
      mainImage.classList.remove("dragging");
    }

    async function loadOptionalTagImage() {
      tagSrc = DEFAULT_TAGS[getPosition()];

      try {
        const response = await fetch(tagSrc, { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);

        tagImage.onload = () => {
          tagEnabled = true;
          applyLayout();
        };

        tagImage.onerror = () => {
          tagEnabled = false;
          triangle.style.display = "none";
          tagImage.classList.remove("visible");
          testStatus.textContent = "tag image load failed";
          console.warn("無法載入標籤圖：" + tagSrc);
        };

        tagImage.src = tagSrc + "?v=" + Date.now();
      } catch (error) {
        tagEnabled = false;
        triangle.style.display = "none";
        tagImage.classList.remove("visible");
        testStatus.textContent = "tag image load skipped";
        console.warn("無法載入標籤圖：" + tagSrc);
      }
    }

    function updateTagSource() {
      loadOptionalTagImage();
    }

    mainUpload.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      if (mainObjectUrl) URL.revokeObjectURL(mainObjectUrl);

      const url = URL.createObjectURL(file);
      mainObjectUrl = url;
      mainSrc = url;
      panX = 0;
      panY = 0;
      isDraggingMain = false;
      mainImage.classList.remove("dragging");

      mainImage.onload = () => {
        updateStageSize();
        applyLayout();
      };

      mainImage.src = url;
      mainImage.hidden = false;
      placeholder.hidden = true;
    });

    stage.addEventListener("pointerdown", (e) => {
      if (!mainSrc) return;
      beginMainDrag(e.clientX, e.clientY);
      if (stage.setPointerCapture) stage.setPointerCapture(e.pointerId);
    });

    stage.addEventListener("pointermove", (e) => {
      moveMainDrag(e.clientX, e.clientY);
    });

    stage.addEventListener("pointerup", (e) => {
      endMainDrag();
      if (stage.releasePointerCapture) stage.releasePointerCapture(e.pointerId);
    });

    stage.addEventListener("pointercancel", endMainDrag);
    stage.addEventListener("pointerleave", endMainDrag);

    stage.addEventListener("touchstart", (e) => {
      if (!mainSrc || !e.touches || !e.touches.length) return;
      const touch = e.touches[0];
      beginMainDrag(touch.clientX, touch.clientY);
    }, { passive: true });

    stage.addEventListener("touchmove", (e) => {
      if (!e.touches || !e.touches.length) return;
      const touch = e.touches[0];
      moveMainDrag(touch.clientX, touch.clientY);
    }, { passive: true });

    stage.addEventListener("touchend", endMainDrag, { passive: true });
    stage.addEventListener("touchcancel", endMainDrag, { passive: true });

    positionRadios.forEach((radio) => {
      radio.addEventListener("change", () => {
        updateTagSource();
        applyLayout();
      });
    });

    tagFileInputs.forEach((input) => {
      input.addEventListener("change", (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const objectUrl = URL.createObjectURL(file);
        DEFAULT_TAGS[input.dataset.tag] = objectUrl;
        updateTagSource();
      });
    });

    mainScale.addEventListener("input", applyLayout);
    watermarkTextInput.addEventListener("input", applyLayout);
    watermarkPatternRadios.forEach((radio) => radio.addEventListener("change", applyLayout));
    watermarkColorInput.addEventListener("input", applyLayout);
    watermarkOpacityInput.addEventListener("input", applyLayout);
    window.addEventListener("resize", applyLayout);

    resetBtn.addEventListener("click", () => {
      mainUpload.value = "";
      mainSrc = "";

      if (mainObjectUrl) {
        URL.revokeObjectURL(mainObjectUrl);
        mainObjectUrl = "";
      }

      mainImage.src = "";
      mainImage.hidden = true;
      panX = 0;
      panY = 0;
      isDraggingMain = false;
      mainImage.classList.remove("dragging");
      placeholder.hidden = false;
      document.querySelector('input[name="position"][value="left-bottom"]').checked = true;
      document.querySelector('input[name="watermarkPattern"][value="none"]').checked = true;
      watermarkTextInput.value = "";
      watermarkColorInput.value = "#555555";
      watermarkOpacityInput.value = "16";
      watermarkOpacityValue.textContent = "16%";
      mainScale.value = "100";
      mainScaleValue.textContent = "100%";
      mainScaleValueNum = 1;
      tagScale.value = "48";
      tagInset.value = "11";
      updateTagSource();
      applyLayout();
    });

    downloadBtn.addEventListener("click", async () => {
      if (!mainSrc) {
        alert("請先上傳主圖片。");
        return;
      }

      const canvas = document.createElement("canvas");
      const w = 1200;
      const h = 1600;
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");

      const loadImage = (src) => new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });

      const drawCover = (targetCtx, img, x, y, boxW, boxH, extraScale, offsetX, offsetY) => {
        const scale = Math.max(boxW / img.width, boxH / img.height) * extraScale;
        const drawW = img.width * scale;
        const drawH = img.height * scale;
        const dx = x + (boxW - drawW) / 2 + offsetX;
        const dy = y + (boxH - drawH) / 2 + offsetY;
        targetCtx.drawImage(img, dx, dy, drawW, drawH);
      };

      try {
        const baseImg = await loadImage(mainSrc);
        const offsetX = panX * (w / Math.max(stage.clientWidth, 1));
        const offsetY = panY * (h / Math.max(stage.clientHeight, 1));
        drawCover(ctx, baseImg, 0, 0, w, h, mainScaleValueNum, offsetX, offsetY);

        if (tagEnabled) {
          const tag = await loadImage(tagImage.src || tagSrc);
          const position = getPosition();
          const stageW = Math.max(stage.clientWidth, 1);
          const stageH = Math.max(stage.clientHeight, 1);
          const ratioX = w / stageW;
          const ratioY = h / stageH;
          const tagDisplayW = stageW * FIXED_TAG_SCALE;
          const tagDisplayH = tagDisplayW * (tag.height / tag.width);
          const drawTagW = tagDisplayW * ratioX;
          const drawTagH = tagDisplayH * ratioY;
          const tri = 110 * ratioX;
          const insetX = FIXED_TAG_INSET * ratioX;
          const insetY = FIXED_TAG_INSET * ratioY;

          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,0.96)";
          ctx.beginPath();

          if (position === "left-bottom") {
            ctx.moveTo(0, h);
            ctx.lineTo(0, h - tri);
            ctx.lineTo(tri, h);
          }
          if (position === "left-top") {
            ctx.moveTo(0, 0);
            ctx.lineTo(tri, 0);
            ctx.lineTo(0, tri);
          }
          if (position === "right-top") {
            ctx.moveTo(w, 0);
            ctx.lineTo(w - tri, 0);
            ctx.lineTo(w, tri);
          }
          if (position === "right-bottom") {
            ctx.moveTo(w, h);
            ctx.lineTo(w - tri, h);
            ctx.lineTo(w, h - tri);
          }

          ctx.closePath();
          ctx.fill();
          ctx.restore();

          let x = 0;
          let y = 0;

          switch (position) {
            case "left-bottom":
              x = insetX;
              y = h - drawTagH - insetY;
              break;
            case "left-top":
              x = insetX;
              y = insetY;
              break;
            case "right-top":
              x = w - drawTagW - insetX;
              y = insetY;
              break;
            case "right-bottom":
              x = w - drawTagW - insetX;
              y = h - drawTagH - insetY;
              break;
          }

          ctx.drawImage(tag, x, y, drawTagW, drawTagH);
        }

        const watermarkText = (watermarkTextInput.value || "").trim();
        const watermarkPattern = getWatermarkPattern();
        const watermarkColor = getWatermarkColor();
        const watermarkOpacity = getWatermarkOpacity();
        const watermarkLuminance = getColorLuminance(watermarkColor);

        if (watermarkText && watermarkPattern !== "none") {
          ctx.save();
          ctx.globalAlpha = 1;
          ctx.fillStyle = hexToRgba(watermarkColor, Math.min(0.98, watermarkOpacity + (watermarkLuminance >= 0.7 ? 0.5 : 0.64)));
          ctx.strokeStyle = hexToRgba(watermarkColor, Math.min(0.9, watermarkOpacity + (watermarkLuminance >= 0.7 ? 0.42 : 0.28)));
          ctx.lineWidth = 2;
          ctx.font = "700 22px sans-serif";
          ctx.shadowBlur = watermarkLuminance >= 0.7 ? 10 : 0;
          ctx.shadowColor = getContrastColor(watermarkColor, watermarkLuminance >= 0.7 ? 0.42 : 0.16);
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          const stepX = Math.max(180, Math.round(w / 3.2));
          const stepY = Math.max(180, Math.round(h / 4));

          for (let py = -60; py < h + 120; py += stepY) {
            for (let px = -80; px < w + 160; px += stepX) {
              ctx.save();
              ctx.translate(px, py);
              ctx.rotate(-24 * Math.PI / 180);

              if (watermarkPattern === "seal") {
                ctx.strokeRect(-52, -52, 104, 104);
              }
              if (watermarkPattern === "grid") {
                for (let i = -48; i <= 48; i += 12) {
                  ctx.beginPath();
                  ctx.moveTo(i, -48);
                  ctx.lineTo(i, 48);
                  ctx.stroke();
                  ctx.beginPath();
                  ctx.moveTo(-48, i);
                  ctx.lineTo(48, i);
                  ctx.stroke();
                }
              }
              if (watermarkPattern === "ring") {
                ctx.beginPath();
                ctx.arc(0, 0, 46, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(0, 0, 30, 0, Math.PI * 2);
                ctx.setLineDash([5, 6]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.save();
                ctx.translate(0, -38);
                ctx.rotate(Math.PI / 4);
                ctx.strokeRect(-7, -7, 14, 14);
                ctx.restore();
              }
              if (watermarkPattern === "diamond") {
                ctx.beginPath();
                ctx.moveTo(0, -54);
                ctx.lineTo(54, 0);
                ctx.lineTo(0, 54);
                ctx.lineTo(-54, 0);
                ctx.closePath();
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, -34);
                ctx.lineTo(34, 0);
                ctx.lineTo(0, 34);
                ctx.lineTo(-34, 0);
                ctx.closePath();
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.moveTo(-18, -40);
                ctx.quadraticCurveTo(-30, -56, -8, -58);
                ctx.moveTo(18, -40);
                ctx.quadraticCurveTo(30, -56, 8, -58);
                ctx.stroke();
              }

              ctx.strokeStyle = getContrastColor(watermarkColor, watermarkLuminance >= 0.7 ? 0.32 : 0.12);
              ctx.lineWidth = watermarkLuminance >= 0.7 ? 1.8 : 1.2;
              ctx.strokeText(watermarkText, 0, 0);
              ctx.fillStyle = hexToRgba(watermarkColor, Math.min(0.98, watermarkOpacity + (watermarkLuminance >= 0.7 ? 0.5 : 0.64)));
              ctx.fillText(watermarkText, 0, 0);
              ctx.restore();
            }
          }
          ctx.restore();
        }

        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download = "tagged-image-3x4.png";
        link.click();
      } catch (err) {
        console.error(err);
        alert("下載失敗，請重新上傳圖片後再試一次。");
      }
    });

        panY = -8;
        updateMainImageScale();
        console.assert(mainImage.style.transform.includes("translate(8px, -5.333333333333333px)") || mainImage.style.transform.includes("translate(8px, -5.33333px)") || mainImage.style.transform.includes("translate(8px, -5.3333px)"), "主圖拖曳位移應反映在 transform 並依縮放校正");

        mainScale.value = "80";
        updateMainImageScale();
        console.assert(mainScale.value === "100", "主圖縮放不得低於 100");

        document.querySelector('input[name="position"][value="right-bottom"]').checked = true;
        applyLayout();
        console.assert(getPosition() === "right-bottom", "radio 切換後位置應正確");

        tagEnabled = true;
        applyLayout();
        console.assert(tagImage.style.right === "11px" || tagImage.style.right === "11", "右下標籤內縮應固定 11px");
        console.assert(tagImage.style.bottom === "11px" || tagImage.style.bottom === "11", "右下標籤內縮應固定 11px");

        watermarkTextInput.value = "測試";
        watermarkColorInput.value = "#3366ff";
        watermarkOpacityInput.value = "28";
        document.querySelector('input[name="watermarkPattern"][value="seal"]').checked = true;
        drawWatermarkPreview();
        console.assert(document.getElementById("watermarkLayer") !== null, "浮水印預覽層應存在");
        console.assert(typeof getWatermarkPattern() === "string", "浮水印圖案值應為字串");
        console.assert(getWatermarkPattern() === "seal", "浮水印圖案應可正確讀取");
        console.assert(getWatermarkColor() === "#3366ff", "浮水印顏色應可正確讀取");
        console.assert(getContrastColor("#ffffff", 0.5).includes("0, 0, 0"), "白色浮水印應取得深色對比描邊");
        console.assert(Math.round(getWatermarkOpacity() * 100) === 28, "浮水印透明度應可正確讀取");

        testStatus.textContent = "inline tests passed";
      } catch (error) {
        console.error("Inline tests failed:", error);
        testStatus.textContent = "inline tests failed";
      }
    }

    mainScale.value = "100";
    mainScaleValue.textContent = "100%";
    mainScaleValueNum = 1;
    tagScale.value = "48";
    tagInset.value = "11";

    updateStageSize();
    loadOptionalTagImage();
    applyLayout();
    runInlineTests();
  </script>
</body>
</html>
